<!DOCTYPE html>
<html>

<body>

    <script>
        const people = [
            "Alice Anderson",
            "Aaron Adams",
            "Bella Brown",
            "Brian Black",
            "Cathy Carter",
            "Charles Cooper",
            "Diana Davis",
            "Daniel Drake",
            "Ella Evans",
            "Ethan Edwards",
            "Fiona Fisher",
            "Frank Foster",
            "Grace Green",
            "Gavin Gray",
            "Hannah Harris",
            "Henry Hill",
            "Isabella Ingram",
            "Ian Irving",
            "Jack Johnson",
            "Julia James"
        ];

        // Choose a letter
        const letter = "B";

        // Filter names that start with B
        const result = people.filter((person) => {
            return person.charAt(0).toUpperCase() === letter.toUpperCase();
        });

        // Display result
        console.log(result);
    </script>

</body>

</html>
